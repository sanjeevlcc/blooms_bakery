name: Deploy static site to Pages

# EVENT: run whenever you push to main (plus a manual "Run" button)
on:
  push:
    branches: [main]
  workflow_dispatch:

# PERMISSIONS: let this workflow publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer push cancels an in-progress one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest        # the fresh machine GitHub gives you
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout             # step 1: copy your repo onto the machine
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload the site      # bundle everything in the repo root (".")
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
